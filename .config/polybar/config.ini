;   go to https://github.com/jaagr/polybar
;
;   The README contains alot of information
;
;==========================================================

[global/wm]
margin-top = 0
margin-bottom = 0

;----------------------------------------------------------

[settings]
compositing-background = source
compositing-border = over
compositing-foreground = over
compositing-overline = over
compositing-underline = over

pseudo-transparency = true

screenchange-reload = false

; throttle-input-for = 30
; throttle-output = 5
; throttle-output-for = 10

;----------------------------------------------------------

; include an external file, like module file, etc.
; assets
include-file = ~/.config/polybar/etc/assets.ini
include-file = ~/.config/polybar/etc/color.ini

; bar
include-file = ~/.config/polybar/bar/i3-bottom.ini
include-file = ~/.config/polybar/bar/i3-top.ini

; modules
; include-file = ~/.config/polybar/modules/script.ini
; include-file = ~/.config/polybar/modules/text.ini
include-file = ~/.config/polybar/modules/mpd.ini
include-file = ~/.config/polybar/modules/modules-bottom.ini
include-file = ~/.config/polybar/modules/modules-top.ini
