; MODULES RIGHT
[module/session]
type = custom/script
interval = 60
exec = getent passwd `whoami` | cut -d : -f 1
click-left = "~/.config/polybar/scripts/session"

format = %{T2}<label>%{T-}
format-font = 1
format-prefix = ""
format-prefix-padding = 1
format-prefix-background = ${color.yellow}
format-prefix-foreground = ${color.black}

label-font = 3
label-padding = 1
label-background = ${color.white}
label-foreground = ${color.black}

[module/date]
type = internal/date
interval = 60
time = "%I:%M %p"
time-alt = "%a, %d %b %Y"

format = <label>
format-font = 1
format-prefix = 
format-prefix-background = ${color.yellow}
format-prefix-foreground = ${color.black}
format-prefix-padding = 1

label = %time%
label-font = 3
label-background = ${color.white}
label-foreground = ${color.black}
label-padding = 1

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
full-at = 95

format-charging = "<animation-charging><label-charging>" 
format-charging-font = 1
label-charging-font = 3
label-charging-padding = 1
label-charging-foreground = ${color.black}
label-charging-background = ${color.white}

format-discharging = "<ramp-capacity><label-discharging>"
format-discharging-font = 1
label-discharging-font = 3
label-discharging-padding = 1
label-discharging-foreground = ${color.black}
label-discharging-background = ${color.white}

format-full = "<label-full>"
format-full-font = 1
format-full-prefix = ""
format-full-prefix-padding = 1
format-full-prefix-foreground = ${color.black} 
format-full-prefix-background = ${color.yellow}
label-full-font = 3
label-full = Full
label-full-background = ${color.white}
label-full-foreground = ${color.black}
label-full-padding = 1

ramp-capacity-0 = ""
ramp-capacity-0-foreground = ${color.red}
ramp-capacity-1 = ""
ramp-capacity-2 = ""
ramp-capacity-3 = ""
ramp-capacity-4 = ""
ramp-capacity-foreground = ${color.black}
ramp-capacity-background = ${color.yellow}
ramp-capacity-padding = 1

animation-charging-0 = " "
animation-charging-1 = " "
animation-charging-2 = " "
animation-charging-3 = " "
animation-charging-4 = " "
animation-charging-foreground = ${color.black}
animation-charging-background = ${color.yellow}
animation-charging-framerate = 750
animation-charging-padding = 1

[module/volume]
type = internal/pulseaudio
sink = alsa_output.pci-0000_03_00.6.analog-stereo
use-ui-max = true
interval = 5

format-volume = <ramp-volume><label-volume>

format-muted = <label-muted>
format-muted-prefix = 
format-muted-prefix-background = ${color.yellow}
format-muted-prefix-foreground = ${color.black}
format-muted-prefix-padding = 1

label-volume = %percentage%%
label-volume-background = ${color.white}
label-volume-foreground = ${color.black}
label-volume-font = 3
label-volume-padding = 1

label-muted = "Mute"
label-muted-foreground = ${color.black}
label-muted-background = ${color.white}
label-muted-padding = 1
label-muted-font = 3

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-background = ${color.yellow}
ramp-volume-foreground = ${color.black}
ramp-volume-padding = 1

[module/backlight]
type = internal/backlight
card = amdgpu_bl1
use-actual-brightness = true
enable-scroll = true
format = <ramp><label>
format-prefix-background = ${color.yellow}

label = %percentage%%
label-background = ${color.white}
label-foreground = ${color.black}
label-font = 3
label-padding = 1

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-3 = 
ramp-4 = 
ramp-5 = 
ramp-background = ${color.yellow}
ramp-foreground = ${color.black}
ramp-padding = 1


[module/memory]
type = internal/memory
interval = 1

format = <label>
format-font = 1
format-prefix = "﬙"
format-prefix-padding = 1
format-prefix-background = ${color.yellow}
format-prefix-foreground = ${color.black}

label = %gb_used%
label-font = 3
label-padding = 1
label-background = ${color.white}
label-foreground = ${color.black}

[module/cpu]
type = internal/cpu
interval = 0.5
warn-percentage = 87

format = <label> 
format-prefix = 
format-prefix-padding = 1
format-prefix-background = ${color.yellow}
format-prefix-foreground = ${color.black}

label-font = 3
label = %percentage%%
label-padding = 1
label-background = ${color.white}
label-foreground = ${color.black}


[module/temperature]
type = internal/temperature
interval = 0.5
thermal-zone = 0
hwmon-path = ${assets.hwmon-path}
warn-temperature = 65
units = true

format = <ramp><label>
format-font = 1
format-warn = <ramp><label-warn>
format-warn-foreground = ${color.red}

label = %temperature-c%
label-background = ${color.white}
label-foreground = ${color.black}
label-font = 3
label-padding = 1

label-warn = "%temperature-c%"
label-warn-background = ${color.background}
label-warn-padding = 1

ramp-0 =  
ramp-1 = 
ramp-2 = 
ramp-3 = 
ramp-4 = 
ramp-background = ${color.yellow}
ramp-foreground = ${color.black}
ramp-padding = 1


[module/filesystem]
type = internal/fs
mount-0 = /
interval = 10
fixed-values = true
spacing = 0

format-mounted = <label-mounted>
format-mounted-prefix = 
format-mounted-prefix-padding = 1
format-mounted-prefix-background = ${color.yellow}
format-mounted-prefix-foreground = ${color.black}
format-mounted-prefix-font = 3

format-unmounted = <label-unmounted>
format-unmounted-prefix = 
format-unmounted-prefix-padding = 1

label-mounted = %used%
label-mounted-font = 3
label-mounted-padding = 1
label-mounted-background = ${color.white}
label-mounted-foreground = ${color.black}

label-unmounted = %mountpoint%: not mounted
label-unmounted-font = 3
label-unmounted-padding = 1

[module/wlan]
type = internal/network
interface = wlp2s0 
interface-type = wireless
interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <ramp-signal><label-connected>
label-connected = "%{A1:networkmanager_dmenu &:}%essid% ﰬ %downspeed:min% ﰵ %upspeed:min%%{A}"
label-connected-font = 3
label-connected-padding = 1
label-connected-background = ${color.white}
label-connected-foreground = ${color.black}
ramp-signal-0 = 
ramp-signal-1 = 
ramp-signal-2 = 
ramp-signal-background = ${color.yellow}
ramp-signal-foreground = ${color.black}
ramp-signal-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-prefix = 
format-disconnected-prefix-background = ${color.yellow}
format-disconnected-prefix-foreground = ${color.black}
format-disconnected-prefix-padding = 1
label-disconnected = "%{A1:networkmanager_dmenu &:}offline%{A}"
label-disconnected-font = 3
label-disconnected-padding = 1
label-disconnected-background = ${color.white}
label-disconnected-foreground = ${color.black}

[module/lan]
type = internal/network
interface = enp3s0 
interface-type = wired
interval = 1
udspeed-minwidth = 2
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix =""
format-connected-prefix-padding = 1
format-connected-prefix-background = ${color.yellow}
format-connected-prefix-foreground = ${color.black}
label-connected = "%{A1:networkmanager_dmenu &:}ﰬ%downspeed:min% ﰵ%upspeed:min%%{A}"
label-connected-font = 3
label-connected-background = ${color.white}
label-connected-foreground = ${color.black}
label-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-prefix =""
format-disconnected-prefix-background = ${color.yellow}
format-disconnected-prefix-foreground = ${color.black}
format-disconnected-prefix-padding = 1
label-disconnected = "%{A1:networkmanager_dmenu &:}offline%{A}"
label-disconnected-font = 3
label-disconnected-padding = 1
label-disconnected-background = ${color.white}
label-disconnected-foreground = ${color.black}


;[module/network]
;type = internal/network
;interface = ${assets.wlan-interface}
;interval = 1
;accumulate-stats = true
;unknown-as-up = true

;format-connected = <ramp-signal><label-connected>
;format-disconnected = <label-disconnected>
;format-disconnected-prefix = 
;format-disconnected-prefix-background = ${color.yellow}
;format-disconnected-prefix-foreground = ${color.black}
;format-disconnected-prefix-padding = 1
;
;label-connected = "%{A1:networkmanager_dmenu &:}%essid% ﰬ %downspeed:min% ﰵ %upspeed:min%%{A}"
;label-connected-font = 3
;label-connected-padding = 1
;label-connected-background = ${color.white}
;label-connected-foreground = ${color.black}
;
;label-disconnected = "%{A1:networkmanager_dmenu &:}disconnected%{A}"
;label-disconnected-font = 3
;label-disconnected-padding = 1
;label-disconnected-background = ${color.white}
;label-disconnected-foreground = ${color.black}

;ramp-signal-0 = 
;ramp-signal-1 = 
;ramp-signal-2 = 
;ramp-signal-background = ${color.yellow}
;ramp-signal-foreground = ${color.black}
;ramp-signal-padding = 1


; MODULES LEFT
[module/workspaces]
type = internal/xworkspaces
pin-workspaces = true
enable-click = true
enable-scroll = true

icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
icon-5 = 6;
icon-6 = 7;
icon-7 = 8;
icon-8 = 9;
icon-9 = 10;
icon-default =

format = <label-state>
format-font = 2

label-monitor = %name%

label-active = %icon%
label-active-foreground = ${color.black}
label-active-background = ${color.yellow}

label-occupied = %icon%
label-occupied-foreground = ${color.black}
label-occupied-background = ${color.white}

label-urgent = %icon%
label-urgent-foreground = ${color.foreground}
label-urgent-background = ${color.red}

label-empty = %icon%
label-empty-foreground = ${color.foreground}
label-empty-background = ${color.background}

label-active-padding = 1
label-urgent-padding = 1
label-occupied-padding = 1
label-empty-padding = 1

[module/jgmenu]
type = custom/text
format = "ﰪ"
click-left = jgmenu_run

format-padding = 1
format-font = 1
format-background = ${color.yellow}
format-foreground = ${color.background}
