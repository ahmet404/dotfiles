[module/mpd]
type = internal/mpd
host = ${assets.mpd-host}
port = ${assets.mpd-port}

format-online = <icon-prev> <icon-pause> <icon-play> <icon-next> %{A1:urxvt -e ncmpcpp:}<label-song>%{A}
format-online-padding = 1
format-online-background = ${color.yellow}
format-online-foreground = ${color.background}

format-offline = <label-offline>
label-offline = 🎜  mpd is offline
label-offline-font = 3
format-offline-padding = 1
format-offline-background = ${color.white}
format-offline-foreground = ${color.background}



label-song =  %title%
label-song-font = 3
label-song-maxlen = 25
label-song-ellipsis = true
label-song-padding = 1
label-song-background = ${color.white}

icon-play = 
icon-pause = 
icon-stop = 
icon-prev = 
icon-next = 
icon-seekb = 
icon-seekf = 
icon-random = 
icon-repeat = 凌
icon-repeatone = 
icon-single = 
icon-consume = ✀

bar-progress-width = 10
bar-progress-indicator = ▮
bar-progress-fill = ▮
bar-progress-empty = ▯


[module/mpd-song]
type = internal/mpd
host = ${assets.mpd-host}
port = ${assets.mpd-port}

format-online = %{A1:st -e ncmpcpp:}<label-song>%{A}
format-online-padding = 1

format-offline = <label-offline>
label-offline = %{T3}ﱙ%{T-}mpd is offline


label-song = %{T3}🎜ﱘ%{T-} %title%
label-song-font = 2
label-song-maxlen = 80
label-song-ellipsis = true
label-song-padding = 1
